services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arcreel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
      POSTGRES_DB: arcreel
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - studio360-stage-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcreel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studio360-stage-internal

  arcreel:
    image: studio360-arcreel:20260717-c980a9f
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://arcreel:${POSTGRES_PASSWORD}@postgres:5432/arcreel
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?Set AUTH_PASSWORD in Coolify}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?Set AUTH_TOKEN_SECRET in Coolify}
      LLM360_CONTROL_PLANE_SERVICE_API_KEY: ${LLM360_CONTROL_PLANE_SERVICE_API_KEY:?Set LLM360_CONTROL_PLANE_SERVICE_API_KEY in Coolify}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    cap_add:
      - NET_ADMIN
    volumes:
      - studio360-stage-projects:/app/projects
      - studio360-stage-logs:/app/logs
      - studio360-stage-vertex-keys:/app/vertex_keys
      - studio360-stage-claude-data:/root/.claude
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1241/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - studio360-stage-internal
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.studio360coolify.rule=Host(`f2p4dtcl1y28d5nozev23jdb.100.77.205.126.sslip.io`)
      - traefik.http.routers.studio360coolify.entrypoints=https
      - traefik.http.routers.studio360coolify.tls=true
      - traefik.http.routers.studio360coolify.tls.certresolver=letsencrypt
      - traefik.http.services.studio360coolify.loadbalancer.server.port=1241

volumes:
  studio360-stage-postgres:
  studio360-stage-projects:
  studio360-stage-logs:
  studio360-stage-vertex-keys:
  studio360-stage-claude-data:

networks:
  studio360-stage-internal:
    internal: true
  coolify:
    external: true
