services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: studio360
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 15s

  studio360:
    image: studio360-waoowaoo:latest
    build:
      context: .
      dockerfile: Dockerfile.studio360
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://root:${DB_PASSWORD}@mysql:3306/studio360"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_TLS: ""
      STORAGE_TYPE: minio
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_BUCKET: "studio360"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "${MINIO_PASSWORD}"
      MINIO_FORCE_PATH_STYLE: "true"
      NEXTAUTH_URL: "https://${COOLIFY_FQDN}"
      INTERNAL_APP_URL: "http://127.0.0.1:3000"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      CRON_SECRET: "${CRON_SECRET}"
      INTERNAL_TASK_TOKEN: "${INTERNAL_TASK_TOKEN}"
      API_ENCRYPTION_KEY: "${API_ENCRYPTION_KEY}"
      WATCHDOG_INTERVAL_MS: "30000"
      TASK_HEARTBEAT_TIMEOUT_MS: "90000"
      QUEUE_CONCURRENCY_IMAGE: "50"
      QUEUE_CONCURRENCY_VIDEO: "50"
      QUEUE_CONCURRENCY_VOICE: "20"
      QUEUE_CONCURRENCY_TEXT: "50"
      BULL_BOARD_HOST: "0.0.0.0"
      BULL_BOARD_PORT: "3010"
      BULL_BOARD_BASE_PATH: "/admin/queues"
      BULL_BOARD_USER: ""
      BULL_BOARD_PASSWORD: ""
      LOG_UNIFIED_ENABLED: "true"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      LOG_DEBUG_ENABLED: "false"
      LOG_AUDIT_ENABLED: "true"
      LOG_SERVICE: "studio360"
      LOG_REDACT_KEYS: "password,token,apiKey,apikey,authorization,cookie,secret,access_token,refresh_token"
      BILLING_MODE: "OFF"
      LLM_STREAM_EPHEMERAL_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --skip-generate && npm --ignore-scripts run start"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.studio360coolify.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.studio360coolify.entrypoints=https"
      - "traefik.http.routers.studio360coolify.tls=true"
      - "traefik.http.routers.studio360coolify.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio360coolify.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  mysql-data:
  redis-data:
  minio-data:

networks:
  coolify:
    external: true
