services:
  postgres:
    image: postgres:18-alpine
    container_name: studio360-postgres
    environment:
      POSTGRES_USER: arcreel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: arcreel
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - ./pgdata:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcreel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studio360-internal

  arcreel:
    image: studio360-arcreel:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: studio360
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arcreel:${POSTGRES_PASSWORD}@postgres:5432/arcreel
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    cap_add:
      - NET_ADMIN
    volumes:
      - ./.env:/app/.env
      - ./projects:/app/projects
      - ./logs:/app/logs
      - ./vertex_keys:/app/vertex_keys
      - ./claude_data:/root/.claude
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1241/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - studio360-internal
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.studio360.rule=Host(`studio360.hmz.one`)
      - traefik.http.routers.studio360.entrypoints=https
      - traefik.http.routers.studio360.tls=true
      - traefik.http.routers.studio360.tls.certresolver=letsencrypt
      - traefik.http.services.studio360.loadbalancer.server.port=1241

networks:
  studio360-internal:
    name: studio360-arcreel-internal
    internal: true
    driver: bridge
  coolify:
    external: true
